name: Release

# GitHub (Open330/agt) is the source of truth. Gitea mirrors it (jiunbae/agt)
# every 8h or via webhook. Tag pushes (`v*`) trigger this workflow and publish
# to public npmjs.com.
#
# Runners:
#   ubuntu-latest  Docker mode (jiun-mini). Linux jobs run inside the per-job
#                  container image declared below.
#   macos-arm64    Host mode (jiun-mini-macos). Native darwin-arm64 build.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Override version (without leading v). Empty = derive from tag.'
        required: false
      dry_run:
        description: 'Build only — skip npm publish and GitHub release upload.'
        required: false
        default: 'false'

env:
  CARGO_TERM_COLOR: always

jobs:
  build-darwin-arm64:
    runs-on: macos-arm64
    steps:
      - uses: actions/checkout@v4

      - name: Show toolchain
        run: |
          uname -smr
          rustup show
          rustup target add aarch64-apple-darwin

      - name: Build
        run: cargo build --release --manifest-path agt/Cargo.toml --target aarch64-apple-darwin

      - name: Stage outputs
        run: |
          mkdir -p out
          cp agt/target/aarch64-apple-darwin/release/agt out/agt
          file out/agt
          tar -C out -czf "out/agt-aarch64-apple-darwin.tar.gz" agt

      - uses: actions/upload-artifact@v3
        with:
          name: agt-darwin-arm64
          path: |
            out/agt
            out/agt-aarch64-apple-darwin.tar.gz

  build-linux:
    runs-on: ubuntu-latest
    # Default container (catthehacker/ubuntu:act-latest) has node + apt + pip,
    # which JS actions need. We add rust + zig manually so the build can
    # cross-compile to musl from arm64 host with a single linker (zig).
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            platform: linux-x64
          - target: aarch64-unknown-linux-musl
            platform: linux-arm64
    steps:
      - uses: actions/checkout@v4

      - name: Show env
        run: |
          uname -smr
          node --version
          which apt-get pip3 python3 curl

      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs \
            | sh -s -- -y --default-toolchain stable --profile minimal \
                       -t ${{ matrix.target }}
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - name: Install Zig
        run: |
          ZIG_VER=0.13.0
          ARCH=$(uname -m)
          mkdir -p "$HOME/.local"
          curl -sSL "https://ziglang.org/download/${ZIG_VER}/zig-linux-${ARCH}-${ZIG_VER}.tar.xz" \
            | tar -xJ -C "$HOME/.local"
          mv "$HOME/.local/zig-linux-${ARCH}-${ZIG_VER}" "$HOME/.local/zig"
          echo "$HOME/.local/zig" >> "$GITHUB_PATH"
          "$HOME/.local/zig/zig" version

      - name: Install cargo-zigbuild
        run: |
          export PATH="$HOME/.cargo/bin:$HOME/.local/zig:$PATH"
          cargo install --locked cargo-zigbuild

      - name: Build (zigbuild)
        run: |
          export PATH="$HOME/.cargo/bin:$HOME/.local/zig:$PATH"
          cargo zigbuild --release --manifest-path agt/Cargo.toml --target ${{ matrix.target }}

      - name: Stage outputs
        run: |
          mkdir -p out
          cp agt/target/${{ matrix.target }}/release/agt out/agt
          file out/agt
          tar -C out -czf "out/agt-${{ matrix.target }}.tar.gz" agt

      - uses: actions/upload-artifact@v3
        with:
          name: agt-${{ matrix.platform }}
          path: |
            out/agt
            out/agt-${{ matrix.target }}.tar.gz

  publish-npm:
    needs: [build-darwin-arm64, build-linux]
    runs-on: ubuntu-latest
    if: ${{ inputs.dry_run != 'true' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v3
        with: { name: agt-darwin-arm64, path: dl/darwin-arm64 }
      - uses: actions/download-artifact@v3
        with: { name: agt-linux-x64,    path: dl/linux-x64 }
      - uses: actions/download-artifact@v3
        with: { name: agt-linux-arm64,  path: dl/linux-arm64 }

      - name: Stage binaries into platform packages
        run: |
          # upload-artifact@v3 strips the common path prefix from the
          # uploaded list, so `out/agt` lands at `dl/<artifact>/agt`.
          for p in darwin-arm64 linux-x64 linux-arm64; do
            mkdir -p "npm/platforms/$p/bin"
            install -m 0755 "dl/$p/agt" "npm/platforms/$p/bin/agt"
          done
          ls -la npm/platforms/*/bin/agt

      - name: Resolve version
        id: ver
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            V="${{ inputs.version }}"
          else
            V="${GITHUB_REF_NAME#v}"
          fi
          echo "version=$V" >> "$GITHUB_OUTPUT"
          echo "Releasing version: $V"

      - name: Bump versions across all manifests
        run: bash scripts/bump-version.sh "${{ steps.ver.outputs.version }}"

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Configure npm auth
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          # Granular access tokens (npm_mc... prefix) lack the user:read
          # scope that `npm whoami` requires, so the readback returns 401
          # even though publish itself succeeds. Skip the check; the
          # subsequent `npm publish` calls will surface auth errors.
          echo "//registry.npmjs.org/:_authToken=${NODE_AUTH_TOKEN}" > ~/.npmrc
          echo "always-auth=true" >> ~/.npmrc

      - name: Publish platform packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -e
          for p in linux-x64 linux-arm64 darwin-arm64; do
            (cd "npm/platforms/$p" && npm publish --access public)
          done

      - name: Publish wrapper package
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: cd npm && npm publish --access public

      - name: Verify published platforms match optionalDependencies
        run: node npm/scripts/verify-platform-packages.js

  # Optional: create a GitHub release with tarballs so postinstall.js fallback
  # download path keeps working. Requires a personal access token with
  # `Contents: Read and write` on Open330/agt stored as GH_RELEASE_TOKEN
  # (fine-grained PAT). Skipped silently if the secret is absent.
  github-release:
    needs: [build-darwin-arm64, build-linux, publish-npm]
    runs-on: ubuntu-latest
    if: ${{ inputs.dry_run != 'true' }}
    steps:
      - uses: actions/download-artifact@v3
        with: { name: agt-darwin-arm64, path: dl/darwin-arm64 }
      - uses: actions/download-artifact@v3
        with: { name: agt-linux-x64,    path: dl/linux-x64 }
      - uses: actions/download-artifact@v3
        with: { name: agt-linux-arm64,  path: dl/linux-arm64 }

      - name: Collect tarballs
        run: |
          mkdir -p release
          cp dl/*/*.tar.gz release/
          ls -la release/

      - name: Push tarballs to GitHub release
        env:
          GH_TOKEN: ${{ secrets.GH_RELEASE_TOKEN }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "GH_RELEASE_TOKEN secret not set on Gitea repo; skipping GitHub release upload."
            exit 0
          fi
          # Tag-triggered runs use GITHUB_REF_NAME directly; workflow_dispatch
          # runs (ref=main) derive the tag from the version input.
          if [ -n "${{ inputs.version }}" ]; then
            TAG="v${{ inputs.version }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi
          REPO="Open330/agt"
          # Find or create release on GitHub
          RID=$(curl -sS -H "Authorization: Bearer $GH_TOKEN" \
            "https://api.github.com/repos/$REPO/releases/tags/$TAG" | jq -r '.id // empty')
          if [ -z "$RID" ]; then
            RID=$(curl -sS -H "Authorization: Bearer $GH_TOKEN" -H "Content-Type: application/json" \
              "https://api.github.com/repos/$REPO/releases" \
              -d "{\"tag_name\":\"$TAG\",\"name\":\"$TAG\",\"generate_release_notes\":true}" \
              | jq -r '.id')
          fi
          echo "GitHub release id: $RID"
          for f in release/*.tar.gz; do
            curl -sS -H "Authorization: Bearer $GH_TOKEN" \
              -H "Content-Type: application/gzip" \
              --data-binary "@${f}" \
              "https://uploads.github.com/repos/$REPO/releases/$RID/assets?name=$(basename "$f")" \
              | jq '{name, browser_download_url}'
          done
